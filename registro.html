<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tabernáculo La Puerta Abierta</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-fondo: linear-gradient(135deg, #020617 0%, #1e3a8a 45%, #3b82f6 100%);
            --color-texto: #ffffff;
            --color-texto-secundario: rgba(255, 255, 255, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(255, 255, 255, 0.1);
            --borde-glass: rgba(255, 255, 255, 0.25);
            --sombra: rgba(0, 0, 0, 0.4);
            --btn-bg: #ffffff;
            --btn-texto: #1e3a8a;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --color-fondo: linear-gradient(135deg, #eff6ff 0%, #bfdbfe 50%, #60a5fa 100%);
                --color-texto: #1e3a8a;
                --color-texto-secundario: rgba(30, 58, 138, 0.7);
                --bg-glass: rgba(30, 58, 138, 0.08);
                --bg-input: rgba(255, 255, 255, 0.5);
                --borde-glass: rgba(30, 58, 138, 0.2);
                --sombra: rgba(30, 58, 138, 0.15);
                --btn-bg: #1e3a8a;
                --btn-texto: #ffffff;
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s ease, color 0.4s ease; }
        body { width: 100%; min-height: 100vh; font-family: 'Inter', sans-serif; color: var(--color-texto); background: var(--color-fondo); background-attachment: fixed; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .card-registro { width: 100%; max-width: 450px; padding: 40px 30px; border-radius: 30px; background: var(--bg-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--borde-glass); box-shadow: 0 20px 40px var(--sombra); text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 700; }
        p { color: var(--color-texto-secundario); font-size: 0.9rem; margin-bottom: 25px; }
        
        .grupo-input { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--borde-glass); background: var(--bg-input); color: var(--color-texto); font-family: inherit; font-size: 0.95rem; outline: none; }
        
        .btn-enviar { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--btn-bg); color: var(--btn-texto); font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px var(--sombra); }
        .btn-enviar:hover { transform: scale(1.02); }
        .enlace-volver { display: inline-block; margin-top: 20px; color: var(--color-texto-secundario); text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="card-registro">
        <h1>Inscripción</h1>
        <p>Únete a la familia de nuestra comunidad</p>
        <form action="#">
            <div class="grupo-input">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required placeholder="Tu nombre y apellido">
            </div>
            <div class="grupo-input">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            <div class="grupo-input">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 8 caracteres">
            </div>
            <button type="submit" class="btn-enviar">Registrarse</button>
        </form>
        <a href="index.html" class="enlace-volver">← Volver al Inicio</a>
    </div>
</body>
</html>
