<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisiones - Tabernáculo La Puerta Abierta</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-fondo: linear-gradient(135deg, #020617 0%, #1e3a8a 45%, #3b82f6 100%);
            --color-texto: #ffffff;
            --color-texto-secundario: rgba(255, 255, 255, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.08);
            --borde-glass: rgba(255, 255, 255, 0.25);
            --sombra: rgba(0, 0, 0, 0.4);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --color-fondo: linear-gradient(135deg, #eff6ff 0%, #bfdbfe 50%, #60a5fa 100%);
                --color-texto: #1e3a8a;
                --color-texto-secundario: rgba(30, 58, 138, 0.7);
                --bg-glass: rgba(30, 58, 138, 0.06);
                --borde-glass: rgba(30, 58, 138, 0.2);
                --sombra: rgba(30, 58, 138, 0.15);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.4s ease, color 0.4s ease; }
        body { width: 100%; min-height: 100vh; font-family: 'Inter', sans-serif; color: var(--color-texto); background: var(--color-fondo); background-attachment: fixed; display: flex; justify-content: center; align-items: center; padding: 20px; }
        
        .container-video { width: 100%; max-width: 800px; padding: 30px; border-radius: 35px; background: var(--bg-glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid var(--borde-glass); box-shadow: 0 20px 40px var(--sombra); text-align: center; }
        h1 { font-size: 2rem; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--color-texto-secundario); font-size: 1rem; margin-bottom: 25px; }
        
        /* Contenedor responsivo para el reproductor de video (Mantiene proporción 16:9) */
        .reproductor-wrap { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 1px solid var(--borde-glass); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .reproductor-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .enlace-volver { display: inline-block; margin-top: 25px; color: var(--color-texto-secundario); text-decoration: none; font-size: 0.9rem; }
        .enlace-volver:hover { color: var(--color-texto); }
    </style>
</head>
<body>
    <div class="container-video">
        <h1>Transmisión en Vivo</h1>
        <p>Acompáñanos en nuestras reuniones y eventos especiales</p>
        
        <div class="reproductor-wrap">
            <!-- REEMPLAZA EL ENLACE DE ABAJO POR TU EMISIÓN DE YOUTUBE O FACEBOOK -->
            <iframe src="rtmp://a.rtmp.youtube.com/live2" allowfullscreen></iframe>
        </div>
        
        <a href="index.html" class="enlace-volver">← Volver al Inicio</a>
    </div>
</body>
</html>
