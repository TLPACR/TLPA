<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisiones - Tabernáculo La Puerta Abierta</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Estilos del reproductor interactivo Plyr -->
    <link rel="stylesheet" href="https://plyr.io" />
    <style>
        /* ==========================================
           1. CONFIGURACIÓN GLOBAL Y VARIABLES (MODOS)
           ========================================== */
        :root {
            --color-fondo-base: #000000;
            --color-fondo: #000000;
            --color-texto: #ffffff;
            --color-texto-secundario: rgba(255, 255, 255, 0.6);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --borde-glass: rgba(255, 255, 255, 0.15);
            --sombra: rgba(0, 0, 0, 0.9);
            --color-primario: #00bfff;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --color-fondo-base: #fcfbf7;
                --color-fondo: #fcfbf7;
                --color-texto: #1c1917;
                --color-texto-secundario: rgba(28, 25, 23, 0.65);
                --bg-glass: rgba(28, 25, 23, 0.04);
                --borde-glass: rgba(28, 25, 23, 0.12);
                --sombra: rgba(28, 25, 23, 0.08);
            }
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease; 
        }

        body { 
            width: 100%; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif; 
            color: var(--color-texto); 
            background-color: var(--color-fondo-base); 
            overflow-x: hidden;
        }

        .wrapper-transmision {
            min-height: 100vh;
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 40px 20px;
            background: var(--color-fondo);
        }
        
        .container-video { 
            width: 100%; 
            max-width: 1200px; 
            padding: 40px 30px; 
            border-radius: 35px; 
            background: var(--bg-glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--borde-glass); 
            box-shadow: 0 20px 40px var(--sombra); 
            text-align: center; 
        }

        h1 { font-size: 2.2rem; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--color-texto-secundario); font-size: 1rem; margin-bottom: 35px; }
        
        /* Grid responsiva para organizar los 2 canales en paralelo */
        .grid-reproductores {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }

        .canal-box {
            flex: 1;
            min-width: 300px;
            max-width: 520px;
            text-align: left;
        }

        .canal-box h3 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--color-texto);
        }

        .plyr-wrap {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--borde-glass);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .enlace-volver { display: inline-block; margin-top: 35px; color: var(--color-texto-secundario); text-decoration: none; font-size: 0.9rem; }
        .enlace-volver:hover { color: var(--color-texto); }

        .plyr { --plyr-color-main: #00bfff; }
    </style>
</head>
<body>
    <div class="wrapper-transmision">
        <div class="container-video">
            <h1>Transmisión en Vivo</h1>
            <p>Acompáñanos en nuestras reuniones y eventos especiales (Puedes pausar o atrasar el directo)</p>
            
            <div class="grid-reproductores">
                <!-- CANAL 1 -->
                <div class="canal-box">
                    <h3>Principal / Canal 1</h3>
                    <div class="plyr-wrap">
                        <video id="video-canal1" controls crossorigin playsinline preload="none"></video>
                    </div>
                </div>
                
                <!-- CANAL 2 -->
                <div class="canal-box">
                    <h3>Secundario / Canal 2</h3>
                    <div class="plyr-wrap">
                        <video id="video-canal2" controls crossorigin playsinline preload="none"></video>
                    </div>
                </div>
            </div>
            
            <a href="index.html" class="enlace-volver">← Volver al Inicio</a>
        </div>
    </div>

    <!-- Scripts obligatorios -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://plyr.io"></script>
    <script>
        // CONFIGURACIÓN: Reemplaza abajo con tu enlace real de Cloudflare (.trycloudflare.com)
        const CONFIG = {
            urlCanal1: "https://continuity-limit-dive-integration.trycloudflare.com/live/canal1/", 
            urlCanal2: "https://continuity-limit-dive-integration.trycloudflare.com/live/canal2/"
        };

        // Inicialización automática de reproductores de forma diferida (al dar Play)
        const transmisiones = [
            { id: '#video-canal1', url: CONFIG.urlCanal1 },
            { id: '#video-canal2', url: CONFIG.urlCanal2 }
        ];

        transmisiones.forEach(stream => {
            const video = document.querySelector(stream.id);
            const controlesPersonalizados = ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'];
            const player = new Plyr(video, { controls: controlesPersonalizados });

            player.on('play', () => {
                if (video.src) return; // Evita recargas duplicadas si ya está cargado

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Carga nativa optimizada para iPhones (iOS/Safari)
                    video.src = stream.url;
                    video.load();
                    video.play().catch(e => console.log("Bloqueo iOS"));
                } else if (Hls.isSupported()) {
                    // Carga mediante Hls.js para Android, PC y Mac
                    const hls = new Hls();
                    hls.loadSource(stream.url);
                    hls.attachMedia(video);
                }
            });
        });
    </script>
</body>
</html>
