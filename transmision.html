<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transmisiones - Tabernáculo La Puerta Abierta</title>
    <!-- Corrección de las fuentes de Google para carga inmediata -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================
           1. CONFIGURACIÓN GLOBAL Y VARIABLES (MODOS)
           ========================================== */
        :root {
            /* Modo Oscuro (Por defecto) - Negro puro sin transparencias */
            --color-fondo-base: #000000;
            --color-fondo: #000000;
            --color-texto: #ffffff;
            --color-texto-secundario: rgba(255, 255, 255, 0.6);
            --bg-glass: rgba(255, 255, 255, 0.05);
            --borde-glass: rgba(255, 255, 255, 0.15);
            --sombra: rgba(0, 0, 0, 0.9);
        }

        /* Detección automática del Modo Claro del sistema operativo */
        @media (prefers-color-scheme: light) {
            :root {
                /* Modo Claro - Blanco cálido suave y elegante */
                --color-fondo-base: #fcfbf7;
                --color-fondo: #fcfbf7;
                --color-texto: #1c1917;
                --color-texto-secundario: rgba(28, 25, 23, 0.65);
                --bg-glass: rgba(28, 25, 23, 0.04);
                --borde-glass: rgba(28, 25, 23, 0.12);
                --sombra: rgba(28, 25, 23, 0.08);
            }
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease; 
        }

        body { 
            width: 100%; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif; 
            color: var(--color-texto); 
            background-color: var(--color-fondo-base); 
            overflow-x: hidden;
        }

        .wrapper-transmision {
            min-height: 100vh;
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            background: var(--color-fondo);
        }
        
        .container-video { 
            width: 100%; 
            max-width: 800px; 
            padding: 30px; 
            border-radius: 35px; 
            background: var(--bg-glass); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--borde-glass); 
            box-shadow: 0 20px 40px var(--sombra); 
            text-align: center; 
        }

        h1 { font-size: 2rem; margin-bottom: 8px; font-weight: 700; }
        p { color: var(--color-texto-secundario); font-size: 1rem; margin-bottom: 25px; }
        
        /* Contenedor responsivo para el reproductor de video (Mantiene proporción 16:9) */
        .reproductor-wrap { 
            position: relative; 
            width: 100%; 
            padding-bottom: 56.25%; 
            height: 0; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid var(--borde-glass); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }

        .reproductor-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .enlace-volver { display: inline-block; margin-top: 25px; color: var(--color-texto-secundario); text-decoration: none; font-size: 0.9rem; }
        .enlace-volver:hover { color: var(--color-texto); }
    </style>
</head>
<body>
    <div class="wrapper-transmision">
        <div class="container-video">
            <h1>Transmisión en Vivo</h1>
            <p>Acompáñanos en nuestras reuniones y eventos especiales</p>
            
            <div class="reproductor-wrap">
                <!-- Se corrigió el enlace eliminando '/live' y la barra final '/' para cargar el visor nativo universal -->
                <iframe src="https://kid-lucas-capitol-hours.trycloudflare.com/live/canal1/" allowfullscreen></iframe>
            </div>
            
            <a href="index.html" class="enlace-volver">← Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
