<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabernáculo La Puerta Abierta</title>
    
    <!-- Metaetiquetas básicas -->
    <meta name="description" content="Sitio web oficial de la comunidad Tabernáculo La Puerta Abierta.">

    <!-- Fuente Tipográfica Moderna (Inter) -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           1. CONFIGURACIÓN GLOBAL Y VARIABLES (MODOS)
           ========================================== */
        :root {
            /* Modo Oscuro (Por defecto) - Cobalto profundo de alto contraste */
            --color-fondo: linear-gradient(135deg, #020617 0%, #1e3a8a 45%, #3b82f6 100%);
            --color-texto: #ffffff;
            --color-texto-secundario: rgba(255, 255, 255, 0.7);
            --bg-glass: rgba(255, 255, 255, 0.07);
            --bg-dock: rgba(255, 255, 255, 0.18);
            --bg-input: rgba(255, 255, 255, 0.1);
            --borde-glass: rgba(255, 255, 255, 0.25);
            --texto-titulo: linear-gradient(to right, #ffffff, #93c5fd);
            --sombra: rgba(0, 0, 0, 0.4);
            --btn-bg: #ffffff;
            --btn-texto: #1e3a8a;
        }

        /* Detección automática del Modo Claro del sistema operativo */
        @media (prefers-color-scheme: light) {
            :root {
                /* Modo Claro - Azul cielo dinámico */
                --color-fondo: linear-gradient(135deg, #eff6ff 0%, #bfdbfe 50%, #60a5fa 100%);
                --color-texto: #1e3a8a;
                --color-texto-secundario: rgba(30, 58, 138, 0.7);
                --bg-glass: rgba(30, 58, 138, 0.06);
                --bg-dock: rgba(30, 58, 138, 0.12);
                --bg-input: rgba(255, 255, 255, 0.5);
                --borde-glass: rgba(30, 58, 138, 0.2);
                --texto-titulo: linear-gradient(to right, #1e3a8a, #1d4ed8);
                --sombra: rgba(30, 58, 138, 0.15);
                --btn-bg: #1e3a8a;
                --btn-texto: #ffffff;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            color: var(--color-texto);
            background: var(--color-fondo);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .wrapper-web {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* ==========================================
           2. BARRA DE NAVEGACIÓN SUPERIOR (NAVBAR)
           ========================================== */
        .navbar {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-radius: 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--borde-glass);
            box-shadow: 0 4px 30px var(--sombra);
            z-index: 10;
        }

        .logo-btn {
            background: none;
            border: none;
            color: inherit;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-links button {
            background: none;
            border: none;
            color: var(--color-texto-secundario);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-links button:hover, .nav-links button.active {
            color: var(--color-texto);
        }

        /* ==========================================
           3. CONTENEDOR DINÁMICO DE PÁGINAS (VISTAS)
           ========================================== */
        .contenedor-principal {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            margin-bottom: auto;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50vh;
        }

        /* Estilo base para cada sección individual */
        .seccion-vista {
            display: none; /* Ocultas por defecto */
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .seccion-vista.active {
            display: block; /* Solo se muestra la pestaña activa */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* VISTA: INICIO (HERO) */
        .contenido-hero { text-align: center; }
        .contenido-hero h1 { font-size: 3rem; font-weight: 700; line-height: 1.2; margin-bottom: 20px; letter-spacing: -1px; background: var(--texto-titulo); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .contenido-hero p { font-size: 1.1rem; color: var(--color-texto-secundario); line-height: 1.6; font-weight: 300; }

        /* VISTAS: TARJETAS FORMULARIOS (ACCEDER / REGISTRO / TRANSMISIÓN) */
        .card-glass {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 35px 25px;
            border-radius: 30px;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--borde-glass);
            box-shadow: 0 20px 40px var(--sombra);
            text-align: center;
        }
        .card-glass h2 { font-size: 2rem; margin-bottom: 8px; font-weight: 700; }
        .card-glass p { color: var(--color-texto-secundario); font-size: 0.95rem; margin-bottom: 25px; }

        /* Formulario Interno */
        .grupo-input { text-align: left; margin-bottom: 18px; }
        .grupo-input label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
        .grupo-input input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--borde-glass); background: var(--bg-input); color: var(--color-texto); font-family: inherit; font-size: 0.95rem; outline: none; }
        .btn-enviar { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--btn-bg); color: var(--btn-texto); font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px var(--sombra); }
        .btn-enviar:hover { transform: scale(1.02); }

        /* Contenedor Multimedia Responsivo */
        .reproductor-wrap { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 1px solid var(--borde-glass); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .reproductor-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ==========================================
           4. EL DOCK TRANSLÚCIDO ESTILO iOS (FOOTER)
           ========================================== */
        .contenedor-dock {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 40px;
            padding-bottom: 20px;
            position: sticky;
            bottom: 20px;
            z-index: 10;
        }

        .ios-dock {
            display: flex;
            gap: 18px;
            padding: 14px 28px;
            border-radius: 35px;
            background: var(--bg-dock); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--borde-glass);
            box-shadow: 0 20px 40px var(--sombra);
        }

        .dock-item {
            width: 55px;
            height: 55px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            background: var(--bg-glass);
            border: 1px solid var(--borde-glass);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .dock-item:hover, .dock-item.active {
            transform: scale(1.25) translateY(-12px);
        }

        /* Ajustes responsivos para pantallas de dispositivos móviles */
        @media (max-width: 600px) {
            .navbar { padding: 12px 20px; }
            .contenido-hero h1 { font-size: 2rem; }
            .nav-links { gap: 15px; }
            .nav-links button { font-size: 0.85rem; }
            .logo-btn { font-size: 1rem; }
            .ios-dock { gap: 12px; padding: 10px 18px; }
            .dock-item { width: 50px; height: 50px; font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="wrapper-web">
        
        <!-- Barra de Navegación Superior -->
        <header class="navbar">
            <button class="logo-btn" onclick="navegarA('inicio')">⛪ Tabernáculo La Puerta Abierta</button>
            <nav>
                <ul class="nav-links">
